# Raspberry Pi first-boot configuration
# Copy this file and edit for your setup.
# Source it from setup.sh: ./setup.sh config/rpi4b_8gb.conf /mnt/boot

HOSTNAME="raspberrypi"

# SSH — create the sentinel file to enable SSH on first boot
SSH_ENABLED=true

# WiFi — set WIFI_ENABLED=true and fill in SSID/password for headless WiFi
WIFI_ENABLED=false
WIFI_SSID=""
WIFI_PASSWORD=""
WIFI_COUNTRY="US"

# User -- generate password hash with: openssl passwd -6 yourpassword
# Leave empty to be prompted on first login
USER_NAME="pi"
USER_PASSWORD_HASH=""

# Locale
TIMEZONE="UTC"
KEYBOARD_LAYOUT="us"
LOCALE="en_US.UTF-8"

# Boot config (config.txt)
ARM_64BIT=true
GPU_MEM=76
ENABLE_UART=false

# Any additional config.txt lines (one per variable, appended as-is)
# Example: EXTRA_CONFIG="over_voltage=2\narm_freq=1800"
EXTRA_CONFIG=""
