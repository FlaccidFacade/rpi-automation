# Raspberry Pi 4B 8GB - default configuration
# Copy and adjust as needed; see config/template.yaml for all options.

device: rpi4b
model: "Raspberry Pi 4B 8GB"

image:
  os: raspios
  variant: lite      # lite = no desktop (recommended for headless use)
  arch: arm64        # 64-bit kernel for RPi 4B
  version: latest

customization:
  hostname: raspberrypi

  ssh:
    enabled: true    # Enable SSH on first boot (recommended for headless setup)

  wifi:
    enabled: false   # Set to true and fill in credentials to use WiFi
    ssid: ""
    password: ""
    country: US      # Two-letter ISO 3166-1 country code

  user:
    name: pi
    # SHA-512 hashed password.
    # Generate with: openssl passwd -6 yourpassword
    # Leave empty to be prompted for a password on first login.
    password_hash: ""

  locale:
    timezone: UTC               # IANA timezone (e.g. America/New_York)
    keyboard_layout: us         # Keyboard layout code (e.g. us, gb, de)
    language: en_US.UTF-8       # Locale string

  boot:
    arm_64bit: true    # Enable 64-bit kernel (required for arm64 image)
    gpu_mem: 76        # GPU memory in MB; 76 is minimum for headless use
    enable_uart: false # Enable hardware UART (disables Bluetooth on RPi 4B)
    extra_params: {}   # Additional config.txt key=value pairs
    # Uncomment the lines below to enable mild overclocking on RPi 4B:
    #   over_voltage: 2
    #   arm_freq: 1800
